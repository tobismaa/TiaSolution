<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tia Demo Access</title>
    <meta name="theme-color" content="#17313e">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-panel auth-hero">
            <p class="hero-tag">Private demo access</p>
            <h1>Your Tia demo link is verified before access is granted.</h1>
            <p class="hero-copy">Issued demo links are private, role-specific, and expire automatically 7 days after they are created.</p>
        </section>
        <section class="auth-panel">
            <div class="panel-head">
                <h2>Demo Link Check</h2>
                <span class="badge pink">Private</span>
            </div>
            <p class="muted" id="demoAccessStatus">Checking your access link.</p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script type="module" src="./js/demo/demo-access-page.js"></script>
</body>
</html>
